name: Deploy Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  gate:
    name: Verify CI Passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed, proceeding with deploy"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Create Vercel Project Metadata
        run: |
          mkdir -p .vercel
          cat <<EOF > .vercel/project.json
          {"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}
          EOF
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build Frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: curl --fail-with-body --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-ml:
    name: Deploy ML Service to HF Spaces
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      - name: Verify HF service files
        run: |
          test -f hf-ml-service/README.md
          test -f hf-ml-service/Dockerfile
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git clone https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_NAME} hf-space
          rsync -av --delete --exclude='.git' --exclude='*.joblib' ./hf-ml-service/ ./hf-space/
          find ./hf-space -name '*.joblib' -type f -delete
          cd hf-space
          git config user.email "deploy@threatforge.dev"
          git config user.name "ThreatForge Deploy"
          if [ -n "$(git status --short)" ]; then
            git add .
            git commit -m "Deploy ML service $(date +%Y-%m-%d_%H:%M)"
            git push origin main
          else
            echo "No Hugging Face changes to deploy"
          fi
